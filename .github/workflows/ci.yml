name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          npm ci 2>/dev/null || npm install

      - name: Select evidence scope from diff (fail-closed)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/ci_select_scope.sh
          BASE_REF="${{ github.base_ref && format('origin/{0}', github.base_ref) || 'origin/main' }}"
          echo "[ci] BASE_REF=${BASE_REF}"
          eval "$(scripts/ci_select_scope.sh "${BASE_REF}" HEAD)"
          echo "[ci] EVIDENCE_SCOPE=${EVIDENCE_SCOPE} reason=${SCOPE_REASON}"
          echo "EVIDENCE_SCOPE=${EVIDENCE_SCOPE}" >> "$GITHUB_ENV"
          echo "SCOPE_REASON=${SCOPE_REASON}" >> "$GITHUB_ENV"

      - name: Detect Task ID (from PR title/branch)
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          TITLE="${{ github.event.pull_request.title }}"
          BRANCH="${{ github.head_ref }}"
          echo "[ci] PR title: $TITLE"
          echo "[ci] PR branch: $BRANCH"

          TASK_ID=""
          if [[ "$TITLE" =~ \[(P[0-9]+-T[0-9]+)\] ]]; then
            TASK_ID="${BASH_REMATCH[1]}"
          elif [[ "$BRANCH" =~ (P[0-9]+-T[0-9]+) ]]; then
            TASK_ID="${BASH_REMATCH[1]}"
          fi

          if [[ -z "$TASK_ID" ]]; then
            echo "[ci] FAIL: could not detect task id from PR title/branch (expected [P?-T?])"
            exit 1
          fi

          echo "[ci] TASK_ID=$TASK_ID"
          echo "TASK_ID=$TASK_ID" >> "$GITHUB_ENV"

      - name: Run evidence (fail-closed)
        shell: bash
        run: |
          set -euo pipefail
          echo "[ci] EVIDENCE_SCOPE=${EVIDENCE_SCOPE} reason=${SCOPE_REASON} TASK_ID=${TASK_ID:-}"
          if [[ -n "${TASK_ID:-}" ]]; then
            bash scripts/run_evidence.sh --scope "${EVIDENCE_SCOPE}" --task "${TASK_ID}"
          else
            bash scripts/run_evidence.sh --scope "${EVIDENCE_SCOPE}"
          fi

      - name: Validate summary.json (fail-closed)
        shell: bash
        run: |
          set -euo pipefail
          python3 -c "import json; p='evidence/summary.json'; d=json.load(open(p,'r',encoding='utf-8')); assert isinstance(d,dict) and 'pass' in d and 'result' in d; print('[ci] evidence/summary.json OK')"
          if ! grep -R --line-number -E '"pass"[[:space:]]*:[[:space:]]*true' evidence/ >/dev/null; then
            echo "No pass:true found under evidence/"
            exit 1
          fi
