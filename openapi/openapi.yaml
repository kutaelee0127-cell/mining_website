  /admin/revisions/{revisionId}/restore:
    post:
      tags:
      - Revisions
      - Admin
      summary: Restore entity to a given revision snapshot
      description: |
        Restores entity state to the selected revision snapshot.

        Restore semantics:
        - Applies the snapshot via **UPSERT** by `entity_id`.
          - If the target row is missing, it is inserted.
          - If the target row is soft-deleted (`deleted_at` set), it is undeleted (`deleted_at=NULL`) and then updated.
        - The restore action itself is recorded as a new RevisionEntry (`restore_of_revision_id`).
      operationId: postAdminRevisionRestore
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      - $ref: '#/components/parameters/IdempotencyKey'
      - name: revisionId
        in: path
        required: true
        schema:
          type: string
      security:
      - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevisionRestoreRequest'
      responses:
        '200':
          description: Restored (returns the updated entity snapshot)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevisionRestoreResponse'
        '404':
          description: Revision not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
