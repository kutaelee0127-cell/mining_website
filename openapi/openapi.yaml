paths:
  /health:
    get:
      tags:
      - System
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /system/version:
    get:
      tags:
      - System
      summary: System version/build info
      operationId: getSystemVersion
      responses:
        '200':
          description: Version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /setup/status:
    get:
      tags:
      - Setup
      summary: First-time setup status (admin exists?)
      operationId: getSetupStatus
      responses:
        '200':
          description: Setup status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatusResponse'
  /setup/admin:
    post:
      tags:
      - Setup
      summary: Create initial admin (one-time)
      operationId: postSetupAdmin
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetupAdminRequest'
      responses:
        '201':
          description: Admin created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupAdminResponse'
        '409':
          description: Setup already done
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/login:
    post:
      tags:
      - Auth
      summary: Admin login (issues access token + sets refresh cookie)
      operationId: postAuthLogin
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Logged in
          headers:
            Set-Cookie:
              description: refresh_token cookie (httpOnly)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limited
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/refresh:
    post:
      tags:
      - Auth
      summary: Refresh access token (rotating refresh session)
      operationId: postAuthRefresh
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      security:
      - RefreshCookieAuth: []
      responses:
        '200':
          description: Refreshed
          headers:
            Set-Cookie:
              description: rotated refresh_token cookie (httpOnly)
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Refresh invalid/expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/logout:
    post:
      tags:
      - Auth
      summary: Logout (revokes refresh session + clears cookie)
      operationId: postAuthLogout
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      - $ref: '#/components/parameters/IdempotencyKey'
      security:
      - BearerAuth: []
      responses:
        '204':
          description: Logged out (no content)
          headers:
            Set-Cookie:
              description: clears refresh_token cookie
              schema:
                type: string
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/me:
    get:
      tags:
      - Admin
      summary: Current admin identity
      operationId: getAdminMe
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Admin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMeResponse'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /public/site:
    get:
      tags:
      - Public
      summary: Public site settings
      operationId: getPublicSite
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Site settings
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteSettings'
  /admin/site:
    patch:
      tags:
      - Admin
      summary: Update site settings
      operationId: patchAdminSite
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/IfMatch'
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSiteSettingsRequest'
      responses:
        '200':
          description: Updated
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteSettings'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Version conflict / idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /public/home:
    get:
      tags:
      - Public
      summary: Home page content
      operationId: getPublicHome
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Home content
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePage'
  /admin/home:
    patch:
      tags:
      - Admin
      summary: Update home page content
      operationId: patchAdminHome
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/IfMatch'
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateHomePageRequest'
      responses:
        '200':
          description: Updated
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePage'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Version conflict / idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /public/about:
    get:
      tags:
      - Public
      summary: About page content (brand story + location + designers)
      operationId: getPublicAbout
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: About content
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AboutPage'
  /admin/about:
    patch:
      tags:
      - Admin
      summary: Update about page content
      operationId: patchAdminAbout
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/IfMatch'
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAboutPageRequest'
      responses:
        '200':
          description: Updated
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AboutPage'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Version conflict / idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /public/designers:
    get:
      tags:
      - Designers
      - Public
      summary: Public designer profiles (published order)
      operationId: getPublicDesigners
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      responses:
        '200':
          description: Designers
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DesignerProfile'
  /admin/designers:
    post:
      tags:
      - Designers
      - Admin
      summary: Create designer profile
      operationId: postAdminDesigner
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      - $ref: '#/components/parameters/IdempotencyKey'
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDesignerProfileRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesignerProfile'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      tags:
      - Designers
      - Admin
      summary: List designer profiles (admin)
      operationId: getAdminDesigners
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      security:
      - BearerAuth: []
      responses:
        '200':
          description: Designers
          content:
            application/json:
              schema:
                type: object
                required:
                - items
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/DesignerProfile'
      description: 'Each item includes `version`; clients may build `If-Match: W/"<version>"` from it. Collection-level ETag
        (if any) is not valid for item PATCH.'
  /admin/designers/{designerId}:
    patch:
      tags:
      - Designers
      - Admin
      summary: Update designer profile
      operationId: patchAdminDesigner
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      - $ref: '#/components/parameters/IdempotencyKey'
      - $ref: '#/components/parameters/IfMatch'
      - name: designerId
        in: path
        required: true
        schema:
          type: string
      security:
      - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDesignerProfileRequest'
      responses:
        '200':
          description: Updated
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesignerProfile'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Version conflict / idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Designers
      - Admin
      summary: Delete designer profile (soft delete)
      operationId: deleteAdminDesigner
      parameters:
      - $ref: '#/components/parameters/AcceptLanguage'
      - $ref: '#/components/parameters/IdempotencyKey'
      - name: designerId
        in: path
        required: true
        schema:
          type: string
      security:
      - BearerAuth: []
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      description: 'Soft delete: sets deleted_at; can be restored via revision restore.'
    get:
      tags:
      - Designers
      - Admin
      summary: Get designer profile (admin)
      operationId: getAdminDesigner
      parameters:
      - &id001
        $ref: '#/components/parameters/AcceptLanguage'
      - name: designerId
        in: path
        required: true
        schema:
          type: string
      security: &id002
      - BearerAuth: []
      responses:
        '200':
          description: OK
          headers:
            ETag:
              $ref: '#/components/headers/ETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DesignerProfile'
        '401':
          description: Not authenticated
          content:
