openapi: 3.0.3
info:
  title: Mining Unjeong Salon Website API (Self-hosted)
  version: 1.0.0
  description: "미닝(mining) 운정점 — 홍보/소개 웹사이트용 API.\n- Public: 방문자 읽기 전용 컨텐츠 제공\n- Admin: 인증 기반 CRUD + 변경 이력(Revision) + 롤백\n\
    - Theme: dark/light (default dark)\n- i18n: ko-KR, en-US\n\nIdempotency:\n- Admin의 모든 변경 요청(POST/PUT/PATCH/DELETE)은 `Idempotency-Key`\
    \ 헤더를 지원/권장합니다.\n- 동일 Key + 동일 요청 해시 => 이전 응답 재사용\n- 동일 Key + 다른 요청 해시 => 409 IDEMPOTENCY_CONFLICT\n\nTimeout/Retry (권장):\n\
    - GET(읽기) 요청: 네트워크 오류 시 지수 백오프(예: 250ms, 500ms, 1s)로 최대 2회 재시도 권장\n- Admin 변경 요청: `Idempotency-Key`를 포함한 경우에만 재시도 허용(최대\
    \ 2회)\n- 파일 업로드: 클라이언트는 재시도 시 동일 파일의 중복 업로드가 발생할 수 있으므로, 업로드 후 entity 연결 단계에서 idempotency 적용 권장\n\n\n    Media upload\
    \ dedupe:\n    - 파일 업로드는 `sha256` 기반 중복 체크를 우선 권장합니다.\n    - `GET /admin/media/by-hash/{sha256}`로 업로드 없이 기존 MediaAsset을\
    \ 조회할 수 있습니다.\n"
servers:
- url: http://localhost:8080/api
  description: Local dev
- url: https://{host}/api
  description: Production (self-hosted)
  variables:
    host:
      default: example.com
tags:
- name: System
- name: Setup
- name: Auth
- name: Public
- name: Admin
- name: Media
- name: Designers
- name: Gallery
- name: Styles
- name: Reviews
- name: Revisions
- name: Integrations
x-constants:
  locales:
    supported:
    - ko-KR
    - en-US
    default: ko-KR
  theme:
    supported:
    - dark
    - light
    default: dark
  upload:
    max_bytes: 10485760
    allowed_content_types:
    - image/jpeg
    - image/png
    - image/webp
    - image/heic
  idempotency:
    ttl_seconds: 86400
  pagination:
    default_limit: 24
    max_limit: 100
  rate_limit:
    login_per_ip_per_minute: 10
  revisions:
    retention:
      max_per_entity: 50
      max_age_days: 90
x-error-codes:
- code: VALIDATION_ERROR
  http_status: 400
- code: AUTH_REQUIRED
  http_status: 401
- code: AUTH_INVALID_CREDENTIALS
  http_status: 401
- code: AUTH_REFRESH_INVALID
  http_status: 401
- code: FORBIDDEN
  http_status: 403
- code: NOT_FOUND
  http_status: 404
- code: CONFLICT
  http_status: 409
- code: VERSION_CONFLICT
  http_status: 409
- code: IDEMPOTENCY_CONFLICT
  http_status: 409
- code: SETUP_ALREADY_DONE
  http_status: 409
- code: RATE_LIMITED
  http_status: 429
- code: MEDIA_UNSUPPORTED_TYPE
  http_status: 415
- code: MEDIA_TOO_LARGE
  http_status: 413
- code: INTERNAL_ERROR
  http_status: 500
x-state-machines:
  RefreshSession:
    states:
    - ACTIVE
    - ROTATED
    - REVOKED
    - EXPIRED
    transitions:
    - from: ACTIVE
      to: ROTATED
      true: refresh_rotation
    - from: ACTIVE
      to: REVOKED
      true: logout
    - from: ROTATED
      to: REVOKED
      true: security_revoke
    - from: ACTIVE
      to: EXPIRED
      true: ttl_elapsed
  RevisionPolicy:
    notes:
    - RevisionEntry는 immutable
    - restore는 "snapshot 적용 + 새 RevisionEntry 생성(restore_of_revision_id 설정)"으로만 수행
