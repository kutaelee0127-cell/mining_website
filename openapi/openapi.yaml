        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    RefreshCookieAuth:
      type: apiKey
      in: cookie
      name: refresh_token
  headers:
    ETag:
      description: Entity tag for optimistic concurrency (If-Match). Derived from entity "version" (e.g., W/"1").
      schema:
        type: string
        example: W/"1"
  parameters:
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        description: Preferred language (ko-KR or en-US). Defaults to ko-KR.
        example: ko-KR
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: Idempotency key for safely retrying mutating requests.
    IfMatch:
      name: If-Match
      in: header
      required: true
      schema:
        type: string
      description: 'Optimistic concurrency control.

        - Use `ETag` from a previous GET/PATCH response.

        - ETag is derived from entity `version` (e.g., `W/"<version>"`).

        - If mismatched, server returns 409 `VERSION_CONFLICT`.'
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        default: 24
        minimum: 1
        maximum: 100
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque pagination cursor returned by previous page.
  schemas:
    HealthResponse:
      type: object
      required:
      - ok
      properties:
        ok:
          type: boolean
          example: true
    VersionResponse:
      type: object
      required:
      - version
      properties:
        version:
          type: string
          example: 1.0.0
        build:
          type: object
          additionalProperties: true
    ErrorResponse:
      type: object
      required:
      - code
      - message
      - request_id
      - timestamp
      properties:
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        request_id:
          type: string
        timestamp:
          type: string
          format: date-time
    Locale:
      type: string
      enum:
      - ko-KR
      - en-US
    Theme:
      type: string
      enum:
      - dark
      - light
    LocalizedText:
      type: object
      required:
      - ko-KR
      properties:
        ko-KR:
          type: string
        en-US:
          type: string
    MoneyKRW:
      type: object
      required:
      - amount
      - currency
      properties:
        amount:
          type: integer
          minimum: 0
        currency:
          type: string
          enum:
          - KRW
    ExternalLink:
      type: object
      required:
      - label
      - url
      - open_in_new_tab
      properties:
        label:
          $ref: '#/components/schemas/LocalizedText'
        url:
          type: string
          format: uri
        open_in_new_tab:
          type: boolean
          default: true
    SiteSettings:
      type: object
      required:
      - id
      - brand_name
      - default_theme
      - supported_locales
      - links
      - version
      - updated_at
      properties:
        id:
          type: string
          example: site
        brand_name:
          $ref: '#/components/schemas/LocalizedText'
        brand_tagline:
          $ref: '#/components/schemas/LocalizedText'
        default_theme:
          $ref: '#/components/schemas/Theme'
        supported_locales:
          type: array
          items:
            $ref: '#/components/schemas/Locale'
        links:
          type: object
          required:
          - booking
          - instagram
          - naver_map
          properties:
            booking:
              $ref: '#/components/schemas/ExternalLink'
            instagram:
              $ref: '#/components/schemas/ExternalLink'
            naver_map:
              $ref: '#/components/schemas/ExternalLink'
        business_hours:
          $ref: '#/components/schemas/LocalizedText'
        contact_phone:
          type: string
        address:
          $ref: '#/components/schemas/LocalizedText'
        location_latlng:
          type: object
          required:
          - lat
          - lng
          properties:
            lat:
              type: number
            lng:
              type: number
        version:
          type: integer
          minimum: 1
        updated_at:
          type: string
          format: date-time
    UpdateSiteSettingsRequest:
      type: object
      additionalProperties: false
      properties:
        brand_name:
          $ref: '#/components/schemas/LocalizedText'
        brand_tagline:
          $ref: '#/components/schemas/LocalizedText'
        default_theme:
          $ref: '#/components/schemas/Theme'
        links:
          type: object
          properties:
            booking:
              $ref: '#/components/schemas/ExternalLink'
            instagram:
              $ref: '#/components/schemas/ExternalLink'
            naver_map:
